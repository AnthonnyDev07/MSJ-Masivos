<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envío Masivo WhatsApp</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #075e54; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        button { background-color: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #128c7e; }
        #resultado { margin-top: 20px; padding: 10px; border-radius: 5px; }
        .info { font-size: 0.9em; color: #666; margin-bottom: 15px; background: #e9e9e9; padding: 10px; border-radius: 4px;}
    </style>
</head>
<body>

<div class="container">
    <h1>WhatsApp Sender</h1>
    
    <div class="info">
        <strong>Formato del Excel:</strong><br>
        Debe tener la primera fila con los títulos: <code>Nombre</code> y <code>Numero</code>.<br>
        El número debe incluir el código de país (ej: 5215555555555).
    </div>

    <div class="form-group">
        <label for="excelFile">1. Cargar archivo de contactos (.xlsx):</label>
        <input type="file" id="excelFile" accept=".xlsx, .xls">
    </div>

    <div class="form-group">
        <label for="mensaje">2. Escribir mensaje (usa {nombre} para personalizar):</label>
        <textarea id="mensaje" rows="4" placeholder="Hola {nombre}, te contacto para..."></textarea>
    </div>

    <div class="form-group">
        <label for="imagen">3. Adjuntar imagen (opcional):</label>
        <input type="file" id="imagen" accept="image/*">
    </div>

    <button onclick="enviarMensajes()" id="btnEnviar">Enviar Mensajes</button>

    <div id="resultado"></div>
</div>

<script>
    async function enviarMensajes() {
        const fileInput = document.getElementById('excelFile');
        const imagenInput = document.getElementById('imagen');
        const mensajeText = document.getElementById('mensaje').value;
        const btn = document.getElementById('btnEnviar');
        const resultadoDiv = document.getElementById('resultado');

        if (fileInput.files.length === 0) {
            alert('Por favor, selecciona un archivo Excel.');
            return;
        }
        if (!mensajeText) {
            alert('Por favor, escribe un mensaje.');
            return;
        }

        const formData = new FormData();
        formData.append('archivoExcel', fileInput.files[0]);
        formData.append('mensaje', mensajeText);

        if (imagenInput.files.length > 0) {
            formData.append('archivoImagen', imagenInput.files[0]);
        }

        btn.disabled = true;
        btn.innerText = "Procesando...";
        resultadoDiv.innerHTML = "Enviando mensajes, por favor espera... Esto puede tardar varios minutos.";
        resultadoDiv.style.backgroundColor = "#fff3cd";

        try {
            const response = await fetch('/enviar-mensajes', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            
            if (response.status >= 400) {
                throw new Error(data.error || 'Error en el servidor');
            }

            resultadoDiv.style.backgroundColor = "#d4edda";
            resultadoDiv.innerHTML = `
                <h3>¡Proceso Completado!</h3>
                <p>Total de contactos: ${data.total}</p>
                <p>Enviados con éxito: ${data.enviados}</p>
                <p>Errores: ${data.errores}</p>
            `;
        } catch (error) {
            resultadoDiv.style.backgroundColor = "#f8d7da";
            resultadoDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.innerText = "Enviar Mensajes";
        }
    }
</script>

</body>
</html>
