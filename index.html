<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envío Masivo WhatsApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>WhatsApp Sender</h1>
    
    <div class="info">
        <strong>Formato del Excel:</strong><br>
        Debe tener la primera fila con los títulos: <code>Nombre</code> y <code>Numero</code>.<br>
        El número debe incluir el código de país (ej: 5215555555555).
    </div>

    <div class="form-group">
        <label for="excelFile">1. Cargar archivo de contactos (.xlsx):</label>
        <input type="file" id="excelFile" accept=".xlsx, .xls">
    </div>

    <div class="form-group">
        <label for="mensaje">2. Escribir mensaje (usa {nombre} para personalizar):</label>
        <textarea id="mensaje" rows="4" placeholder="Hola {nombre}, te contacto para..."></textarea>
    </div>

    <div class="form-group">
        <label for="imagen">3. Adjuntar imagen (opcional):</label>
        <input type="file" id="imagen" accept="image/*">
    </div>

    <button onclick="enviarMensajes()" id="btnEnviar">Enviar Mensajes</button>

    <div id="resultado"></div>
    <div id="logs-container" style="display: none; justify-content: space-between; margin-top: 20px; display: flex; gap:20px">
        <div id="success-container" style="flex: 1;">
            <h3 style="color: #28a745; margin-bottom: 10px; text-align: center;">Envíos Exitosos</h3>
            <div id="success-log" class="log-box" style="background-color: #d4edda; border-color: #c3e6cb;"></div>
        </div>
        <div id="error-container" style="flex: 1;">
            <h3 style="color: #dc3545; margin-bottom: 10px; text-align: center;">Errores y Omitidos</h3>
            <div id="error-log" class="log-box" style="background-color: #f8d7da; border-color: #f5c6cb;"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
